<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}body{margin:0;}
  /* --- 20th-anniversary entry intro: full-viewport overlay that plays on every visit,
         then dissolves through a frosted-glass blur to reveal the real site underneath.
         Skipped entirely for prefers-reduced-motion (see Component state below). --- */
  .hispa-intro-overlay{
    position:fixed;inset:0;z-index:9999;background:#000;opacity:1;
    backdrop-filter:blur(26px);-webkit-backdrop-filter:blur(26px);
    transition:opacity 1.1s ease,backdrop-filter 1.1s ease,-webkit-backdrop-filter 1.1s ease;
  }
  .hispa-intro-overlay--leaving{
    opacity:0;backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);pointer-events:none;
  }
</style>
</helmet>
<div style="background:#090F23;font-family:'Figtree','Hanken Grotesk',sans-serif;overflow-x:hidden;">
  <!-- entry intro overlay (plays on every visit/refresh; reduced-motion visitors skip it) -->
  <sc-if value="{{ introVisible }}" hint-placeholder-val="{{ false }}">
    <div class="hispa-intro-overlay{{ introLeavingClass }}">
      <dc-import name="Intro20" hint-size="100%,100%"></dc-import>
    </div>
  </sc-if>

  <!-- Homepage = header + anniversary hero + footer, matching the 1672×941 reference
       (the photo ribbons, Then/Now headings and gold waves all live inside HeroGala20). -->
  <dc-import name="Nav" active="" theme="gala" hint-size="100%,104px"></dc-import>

  <dc-import name="HeroGala20" hint-size="100%,756px"></dc-import>

  <dc-import name="Footer" theme="gala" hint-size="100%,420px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1672,&quot;height&quot;:941}}">
class Component extends DCLogic {
  // Plays the 20th-anniversary intro (Intro20) on EVERY visit/refresh of the homepage.
  // Only reduced-motion visitors skip it (the sequence is a full-screen animation with camera
  // flashes — a photosensitivity/vestibular risk — so it's exempted for accessibility).
  state = {
    introVisible: (() => {
      try {
        return !(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches);
      } catch (e) { return true; }
    })(),
    introLeaving: false,
  };

  componentDidMount(){
    this._onIntroDone = () => this.beginIntroExit();
    document.addEventListener('hispa-intro-done', this._onIntroDone);
    // Safety net: there's no manual Skip control anymore, so guarantee the intro can never get
    // stuck. It dispatches 'hispa-intro-done' at ~10.5s; if that event ever fails to arrive, this
    // dismisses the overlay anyway.
    if (this.state.introVisible) this._introFailsafe = setTimeout(() => this.beginIntroExit(), 14000);
  }
  componentWillUnmount(){
    document.removeEventListener('hispa-intro-done', this._onIntroDone);
    if (this._introExitTimer) clearTimeout(this._introExitTimer);
    if (this._introFailsafe) clearTimeout(this._introFailsafe);
  }

  beginIntroExit(){
    if (!this.state.introVisible || this.state.introLeaving) return;
    if (this._introFailsafe) clearTimeout(this._introFailsafe);
    this.setState({ introLeaving: true });
    // matches the CSS transition duration (1.1s) + a small buffer, then fully unmounts Intro20
    this._introExitTimer = setTimeout(() => this.setState({ introVisible: false }), 1200);
  }

  renderVals(){
    return {
      introVisible: this.state.introVisible,
      introLeavingClass: this.state.introLeaving ? ' hispa-intro-overlay--leaving' : '',
    };
  }
}
</script>
</body>
</html>
