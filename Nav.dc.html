<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* Brand tokens - verified against the official logo assets (brand/hispa-logo.png,
     brand/anniversary-20th.png) and PRODUCT.md; already live across every page. Declared
     here because Nav is dc-imported on every page, so these vars are globally available. */
  :root{
    --hispa-navy:#102A43;
    --hispa-orange:#F1601A;
    --hispa-green:#7CC03B;
    --hispa-blue:#2E8FB5;
    --hispa-cream:#FBF6EE;
  }
  /* Shared scroll-reveal utility (duration .6s, ease-out, .1s stagger via data-i * 100ms
     JS delay) - reused verbatim by any page/component that reveals content on scroll. */
  .reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease-out,transform .6s ease-out;}
  .reveal.is-visible{opacity:1;transform:none;}
  @media (prefers-reduced-motion:reduce){
    .reveal{transition:none !important;opacity:1 !important;transform:none !important;}
  }

  .hispa-underline{position:absolute;left:0;right:0;bottom:-2px;height:2px;background:#F1601A;border-radius:2px;}
  .hispa-links{display:flex;align-items:center;gap:20px;}
  .hispa-toggle{display:none;}
  .hispa-login-btn{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(16,42,67,0.18);background:transparent;color:#102A43;cursor:pointer;padding:0;}
  .hispa-login-btn:hover{border-color:rgba(16,42,67,0.4);}
  .hispa-toggle:focus-visible,.hispa-login-btn:focus-visible,.hispa-links a:focus-visible,.hispa-mobile-link:focus-visible{outline:2px solid #2E8FB5;outline-offset:3px;}
  @media (max-width:1180px){
    .hispa-links{display:none;}
    .hispa-toggle{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;border:1.5px solid rgba(16,42,67,0.14);background:transparent;cursor:pointer;padding:0;}
  }
  @keyframes hispa-panel-in{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:none;}}
  .hispa-mobile-panel{animation:hispa-panel-in .22s ease-out both;}
  @media (prefers-reduced-motion:reduce){.hispa-mobile-panel{animation:none;}}
  .hispa-mobile-link{display:block;padding:14px 4px;font-size:16px;font-weight:600;text-decoration:none;border-bottom:1px solid rgba(16,42,67,0.07);}
</style>
</helmet>
<header style="position:sticky;top:0;z-index:50;background:rgba(251,246,238,0.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(16,42,67,0.10);font-family:'Hanken Grotesk',sans-serif;">
  <div style="max-width:1200px;margin:0 auto;padding:0 32px;height:74px;display:flex;align-items:center;justify-content:space-between;gap:24px;">
    <a href="Home.dc.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;flex-shrink:0;">
      <img src="brand/hispa-logo.svg" alt="HISPA" style="height:52px;width:auto;display:block;" />
      <img src="brand/anniversary-20th.png" alt="HISPA 20th Anniversary" style="height:50px;width:auto;display:block;border-left:1px solid rgba(16,42,67,0.15);padding-left:14px;" />
    </a>
    <nav class="hispa-links" aria-label="Primary">
      <a href="What%20HISPA%20Does.dc.html" style="position:relative;text-decoration:none;font-size:14px;font-weight:600;color:{{ doesColor }};padding:4px 0;">What We Do
        <sc-if value="{{ isDoes }}" hint-placeholder-val="{{ false }}"><span class="hispa-underline"></span></sc-if>
      </a>
      <a href="How%20HISPA%20Began.dc.html" style="position:relative;text-decoration:none;font-size:14px;font-weight:600;color:{{ beganColor }};padding:4px 0;">Our Story
        <sc-if value="{{ isBegan }}" hint-placeholder-val="{{ false }}"><span class="hispa-underline"></span></sc-if>
      </a>
      <a href="Timeline.dc.html" style="position:relative;text-decoration:none;font-size:14px;font-weight:600;color:{{ timelineColor }};padding:4px 0;">Timeline
        <sc-if value="{{ isTimeline }}" hint-placeholder-val="{{ false }}"><span class="hispa-underline"></span></sc-if>
      </a>
      <a href="Voices.dc.html" style="position:relative;text-decoration:none;font-size:14px;font-weight:600;color:{{ voicesColor }};padding:4px 0;">Voices
        <sc-if value="{{ isVoices }}" hint-placeholder-val="{{ false }}"><span class="hispa-underline"></span></sc-if>
      </a>
      <a href="Then%20Now%20Next.dc.html" style="position:relative;text-decoration:none;font-size:14px;font-weight:600;color:{{ tnnColor }};padding:4px 0;white-space:nowrap;">Then · Now · Next
        <sc-if value="{{ isTnn }}" hint-placeholder-val="{{ false }}"><span class="hispa-underline"></span></sc-if>
      </a>
      <a href="Recognition.dc.html" style="position:relative;text-decoration:none;font-size:14px;font-weight:600;color:{{ recognitionColor }};padding:4px 0;">Recognition
        <sc-if value="{{ isRecognition }}" hint-placeholder-val="{{ false }}"><span class="hispa-underline"></span></sc-if>
      </a>
      <a href="Our%20Thank%20Yous.dc.html" style="position:relative;text-decoration:none;font-size:14px;font-weight:600;color:{{ thankyousColor }};padding:4px 0;white-space:nowrap;">Our Thank Yous
        <sc-if value="{{ isThankYous }}" hint-placeholder-val="{{ false }}"><span class="hispa-underline"></span></sc-if>
      </a>
      <button type="button" class="hispa-login-btn" title="Log in (coming soon)" aria-label="Log in (coming soon)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <a href="#" style="text-decoration:none;font-size:14px;font-weight:700;color:#fff;background:#F1601A;padding:10px 20px;border-radius:999px;box-shadow:0 4px 12px rgba(241,96,26,0.28);white-space:nowrap;">Get Involved</a>
    </nav>
    <button type="button" class="hispa-toggle" onclick="{{ toggleMenu }}" aria-controls="hispaMobilePanel" aria-expanded="{{ menuOpen }}" aria-label="{{ hamburgerLabel }}">
      <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 5L19 19M19 5L5 19" stroke="#102A43" stroke-width="2.4" stroke-linecap="round"/></svg>
      </sc-if>
      <sc-if value="{{ menuClosed }}" hint-placeholder-val="{{ true }}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 6H20M4 12H20M4 18H20" stroke="#102A43" stroke-width="2.2" stroke-linecap="round"/></svg>
      </sc-if>
    </button>
  </div>
  <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
    <div id="hispaMobilePanel" class="hispa-mobile-panel" role="dialog" aria-label="Site navigation" style="position:absolute;top:74px;left:0;right:0;background:rgba(251,246,238,0.98);backdrop-filter:blur(10px);border-bottom:1px solid rgba(16,42,67,0.10);box-shadow:0 16px 28px rgba(16,42,67,0.12);padding:6px 32px 22px;">
      <a href="What%20HISPA%20Does.dc.html" class="hispa-mobile-link" style="color:{{ doesColor }};">What We Do</a>
      <a href="How%20HISPA%20Began.dc.html" class="hispa-mobile-link" style="color:{{ beganColor }};">Our Story</a>
      <a href="Timeline.dc.html" class="hispa-mobile-link" style="color:{{ timelineColor }};">Timeline</a>
      <a href="Voices.dc.html" class="hispa-mobile-link" style="color:{{ voicesColor }};">Voices</a>
      <a href="Then%20Now%20Next.dc.html" class="hispa-mobile-link" style="color:{{ tnnColor }};">Then · Now · Next</a>
      <a href="Recognition.dc.html" class="hispa-mobile-link" style="color:{{ recognitionColor }};">Recognition</a>
      <a href="Our%20Thank%20Yous.dc.html" class="hispa-mobile-link" style="color:{{ thankyousColor }};border-bottom:none;">Our Thank Yous</a>
      <div style="display:flex;align-items:center;gap:14px;margin-top:18px;">
        <button type="button" class="hispa-login-btn" title="Log in (coming soon)" aria-label="Log in (coming soon)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <a href="#" style="flex:1;text-align:center;text-decoration:none;font-size:15px;font-weight:700;color:#fff;background:#F1601A;padding:13px 20px;border-radius:999px;box-shadow:0 4px 12px rgba(241,96,26,0.28);">Get Involved</a>
      </div>
    </div>
  </sc-if>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:74},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;&quot;,&quot;does&quot;,&quot;began&quot;,&quot;timeline&quot;,&quot;voices&quot;,&quot;tnn&quot;,&quot;recognition&quot;,&quot;thankyous&quot;],&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { menuOpen: false };
  renderVals() {
    const active = this.props.active || "";
    const navy = "#102A43", on = "#F1601A";
    const c = (k) => active === k ? on : navy;
    const menuOpen = !!this.state.menuOpen;
    return {
      isDoes: active === "does", isBegan: active === "began",
      isTimeline: active === "timeline", isVoices: active === "voices",
      isTnn: active === "tnn", isRecognition: active === "recognition", isThankYous: active === "thankyous",
      doesColor: c("does"), beganColor: c("began"),
      timelineColor: c("timeline"), voicesColor: c("voices"), tnnColor: c("tnn"),
      recognitionColor: c("recognition"), thankyousColor: c("thankyous"),
      menuOpen, menuClosed: !menuOpen,
      hamburgerLabel: menuOpen ? "Close menu" : "Open menu",
      toggleMenu: () => this.setState({ menuOpen: !this.state.menuOpen }),
    };
  }
}
</script>
</body>
</html>
