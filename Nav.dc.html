<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</helmet>
<header style="position:sticky;top:0;z-index:50;background:rgba(251,246,238,0.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(16,42,67,0.10);font-family:'Hanken Grotesk',sans-serif;">
  <div style="max-width:1200px;margin:0 auto;padding:0 32px;height:74px;display:flex;align-items:center;justify-content:space-between;gap:24px;">
    <a href="Home.dc.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;">
      <img src="assets/hispa-logo.png" alt="HISPA" style="height:52px;width:auto;display:block;" />
      <span style="font-size:10px;font-weight:700;letter-spacing:0.14em;color:#2E8FB5;text-transform:uppercase;border-left:1px solid rgba(16,42,67,0.15);padding-left:12px;line-height:1.3;">Inspiring<br>Students</span>
    </a>
    <nav style="display:flex;align-items:center;gap:30px;">
      <a href="What%20HISPA%20Does.dc.html" style="position:relative;text-decoration:none;font-size:15px;font-weight:600;color:{{ doesColor }};padding:4px 0;">What We Do
        <sc-if value="{{ isDoes }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;left:0;right:0;bottom:-2px;height:2px;background:#F1601A;border-radius:2px;"></span></sc-if>
      </a>
      <a href="How%20HISPA%20Began.dc.html" style="position:relative;text-decoration:none;font-size:15px;font-weight:600;color:{{ beganColor }};padding:4px 0;">Our Story
        <sc-if value="{{ isBegan }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;left:0;right:0;bottom:-2px;height:2px;background:#F1601A;border-radius:2px;"></span></sc-if>
      </a>
      <a href="Timeline.dc.html" style="position:relative;text-decoration:none;font-size:15px;font-weight:600;color:{{ timelineColor }};padding:4px 0;">Timeline
        <sc-if value="{{ isTimeline }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;left:0;right:0;bottom:-2px;height:2px;background:#F1601A;border-radius:2px;"></span></sc-if>
      </a>
      <a href="Voices.dc.html" style="position:relative;text-decoration:none;font-size:15px;font-weight:600;color:{{ voicesColor }};padding:4px 0;">Voices
        <sc-if value="{{ isVoices }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;left:0;right:0;bottom:-2px;height:2px;background:#F1601A;border-radius:2px;"></span></sc-if>
      </a>
      <a href="Then%20Now%20Next.dc.html" style="position:relative;text-decoration:none;font-size:15px;font-weight:600;color:{{ tnnColor }};padding:4px 0;">Then · Now · Next
        <sc-if value="{{ isTnn }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;left:0;right:0;bottom:-2px;height:2px;background:#F1601A;border-radius:2px;"></span></sc-if>
      </a>
      <a href="#" style="text-decoration:none;font-size:14px;font-weight:700;color:#fff;background:#F1601A;padding:10px 20px;border-radius:999px;box-shadow:0 4px 12px rgba(241,96,26,0.28);">Get Involved</a>
    </nav>
  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:74},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;&quot;,&quot;does&quot;,&quot;began&quot;,&quot;timeline&quot;,&quot;voices&quot;,&quot;tnn&quot;],&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || "";
    const navy = "#102A43", on = "#F1601A";
    const c = (k) => active === k ? on : navy;
    return {
      isDoes: active === "does", isBegan: active === "began",
      isTimeline: active === "timeline", isVoices: active === "voices",
      isTnn: active === "tnn",
      doesColor: c("does"), beganColor: c("began"),
      timelineColor: c("timeline"), voicesColor: c("voices"), tnnColor: c("tnn"),
    };
  }
}
</script>
</body>
</html>
