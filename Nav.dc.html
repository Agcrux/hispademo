<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* Brand tokens — OFFICIAL values from the HISPA Brand Guidelines deck (2026-07-10).
     Declared here because Nav is dc-imported on every page, so these vars are global.
     Note: the deck's "Orioles Orange" hex (#f0b36f) is a typo — its own RGB(253,77,28)
     and CMYK(0,70,89,1) agree on #FD4D1C, which is what the swatch shows.
     Brand type is Sofia Pro (commercial): all sans stacks lead with 'Sofia Pro' so it
     activates automatically once a licensed webfont kit is added; Figtree/Hanken
     Grotesk remain the loaded fallbacks until then. */
  :root{
    --hispa-orange:#FD4D1C;     /* Orioles Orange — headlines, elements */
    --hispa-blue:#016995;       /* Sea Blue — subtitles, elements */
    --hispa-green:#5EB002;      /* Kelly Green — elements */
    --hispa-cerulean:#00A8E2;   /* Vivid Cerulean (secondary) — elements */
    --hispa-sheen:#8ACA0C;      /* Sheen Green (secondary) — elements */
    --hispa-navy:#002B3A;       /* Maastricht Blue — paragraph text */
    --hispa-cream:#FBF6EE;      /* site page background (not a guideline colour) */
  }
  /* Shared scroll-reveal utility (duration .6s, ease-out, .1s stagger via data-i * 100ms
     JS delay) - reused verbatim by any page/component that reveals content on scroll. */
  .reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease-out,transform .6s ease-out;}
  .reveal.is-visible{opacity:1;transform:none;}
  @media (prefers-reduced-motion:reduce){
    .reveal{transition:none !important;opacity:1 !important;transform:none !important;}
  }

  .hispa-underline{position:absolute;left:0;right:0;bottom:-2px;height:2px;background:#FD4D1C;border-radius:2px;}
  .hispa-links{display:flex;align-items:center;gap:20px;}
  .hispa-toggle{display:none;}
  /* header height lives in a class (not inline) so the gala theme can be taller on
     desktop yet compact on mobile without touching the other pages' cream header */
  .hispa-head-inner{height:74px;}
  .hispa-mobile-panel{top:74px;}
  .hispa-cta{transition:transform .18s ease, box-shadow .18s ease;}
  .hispa-cta:hover{transform:translateY(-1px);}
  /* --- gala theme (homepage): glassmorphic space-blue header, 104px tall, gold CTA --- */
  .hispa-head--gala .hispa-head-inner{height:104px;}
  .hispa-head--gala .hispa-links{gap:24px;}
  .hispa-head--gala .hispa-links a{position:relative;}
  .hispa-head--gala .hispa-links a:not(.hispa-cta)::after{content:"";position:absolute;left:0;right:100%;bottom:-3px;height:2px;border-radius:2px;background:linear-gradient(90deg,#D3A84E,#F3D17E);transition:right .22s ease;}
  .hispa-head--gala .hispa-links a:not(.hispa-cta):hover::after{right:0;}
  .hispa-head--gala .hispa-login-btn{width:45px;height:45px;border-color:rgba(234,242,251,0.26);color:#EAF2FB;}
  .hispa-head--gala .hispa-login-btn:hover{border-color:rgba(234,242,251,0.5);}
  .hispa-head--gala .hispa-toggle{border-color:rgba(234,242,251,0.24);}
  .hispa-head--gala .hispa-mobile-link{border-bottom-color:rgba(234,242,251,0.08);}
  .hispa-head--gala .hispa-mobile-panel{top:104px;}
  /* cosmic decor layer (stars / nebula / constellations) — its own clipped wrapper so it
     can't spill out of the bar and can't clip the absolutely-positioned mobile panel */
  .hispa-head-decor{position:absolute;inset:0;overflow:hidden;z-index:0;pointer-events:none;}
  .hispa-head-decor .hispa-neb{position:absolute;border-radius:50%;}
  .hispa-head-decor svg{position:absolute;inset:0;width:100%;height:100%;}
  @keyframes hispaTwinkle{0%,100%{opacity:.25;}50%{opacity:.9;}}
  .hispa-star{animation:hispaTwinkle var(--d,4.5s) ease-in-out infinite;animation-delay:var(--dl,0s);}
  @media (prefers-reduced-motion:reduce){ .hispa-star{animation:none;opacity:.55;} }
  /* mouse-follow light: soft diffused blue-white glow with a brighter core, eased
     toward the cursor by JS (initialised only on fine-pointer, motion-tolerant devices) */
  .hispa-glow{position:absolute;left:0;top:0;width:340px;height:340px;border-radius:50%;pointer-events:none;
    opacity:0;transition:opacity .45s ease;mix-blend-mode:screen;will-change:transform;
    background:radial-gradient(circle, rgba(178,220,255,0.28) 0%, rgba(140,190,250,0.13) 34%, rgba(120,170,240,0) 68%);}
  /* pointer-parallax layers: JS eases each [data-plx] element by (normalized cursor × factor) */
  .hispa-head-decor [data-plx]{will-change:transform;}
  /* glass reflection streak — slides subtly with the cursor (high parallax factor) */
  .hispa-sheen{position:absolute;top:-30px;bottom:-30px;left:-70px;right:-70px;pointer-events:none;
    background:linear-gradient(112deg, transparent 34%, rgba(160,200,255,0.05) 46%, rgba(212,236,255,0.10) 50%, rgba(160,200,255,0.05) 54%, transparent 66%);}
  /* tiny particles that drift slowly on their own (independent of the cursor) */
  @keyframes hispaDrift{0%,100%{transform:translate(0,0);}50%{transform:translate(10px,-6px);}}
  .hispa-drift{position:absolute;width:3px;height:3px;border-radius:50%;pointer-events:none;
    background:rgba(200,228,255,0.55);box-shadow:0 0 6px rgba(160,205,255,0.8);
    animation:hispaDrift var(--d,16s) ease-in-out infinite;animation-delay:var(--dl,0s);}
  @media (prefers-reduced-motion:reduce){ .hispa-drift{animation:none;} }
  @media (max-width:820px){
    .hispa-head--gala .hispa-head-inner{height:74px;}
    .hispa-head--gala .hispa-mobile-panel{top:74px;}
  }
  /* gala compact header keeps a visible profile control next to the hamburger
     (compound selector so it outranks .hispa-login-btn's display:inline-flex) */
  .hispa-login-btn.hispa-gala-login{display:none;}
  @media (max-width:1180px){
    .hispa-head--gala .hispa-login-btn.hispa-gala-login{display:inline-flex;}
  }
  .hispa-login-btn{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(0,43,58,0.18);background:transparent;color:#002B3A;cursor:pointer;padding:0;}
  .hispa-login-btn:hover{border-color:rgba(0,43,58,0.4);}
  .hispa-toggle:focus-visible,.hispa-login-btn:focus-visible,.hispa-links a:focus-visible,.hispa-mobile-link:focus-visible{outline:2px solid #016995;outline-offset:3px;}
  @media (max-width:1180px){
    .hispa-links{display:none;}
    .hispa-toggle{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;border:1.5px solid rgba(0,43,58,0.14);background:transparent;cursor:pointer;padding:0;}
  }
  @keyframes hispa-panel-in{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:none;}}
  .hispa-mobile-panel{animation:hispa-panel-in .22s ease-out both;}
  @media (prefers-reduced-motion:reduce){.hispa-mobile-panel{animation:none;}}
  .hispa-mobile-link{display:block;padding:14px 4px;font-size:16px;font-weight:600;text-decoration:none;border-bottom:1px solid rgba(0,43,58,0.07);}
</style>
</helmet>

<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:74},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;&quot;,&quot;does&quot;,&quot;began&quot;,&quot;timeline&quot;,&quot;voices&quot;,&quot;tnn&quot;,&quot;recognition&quot;,&quot;thankyous&quot;],&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { menuOpen: false };

  componentDidMount(){
    if ((this.props.theme || "") === "gala" && !this._glow) this._glow = this._initGlow(this.headEl);
  }
  componentWillUnmount(){ if (this._glow) { this._glow(); this._glow = null; } }

  /* Interactive space environment: eased mouse-follow glow + pointer parallax on
     every [data-plx] decor layer (stars, nebulas, glass sheen — each eases by
     normalized-cursor × its factor, so the sky shifts subtly around the pointer).
     Skipped entirely on touch/coarse-pointer devices and under prefers-reduced-motion
     (those get the graceful static version). Returns a cleanup function. */
  _initGlow(host){
    try {
      if (!host || !window.matchMedia) return null;
      if (!matchMedia("(hover: hover) and (pointer: fine)").matches) return null;
      if (matchMedia("(prefers-reduced-motion: reduce)").matches) return null;
      const glow = host.querySelector(".hispa-glow");
      if (!glow) return null;
      const half = glow.offsetWidth / 2 || 170;
      const plx = [...host.querySelectorAll("[data-plx]")].map((el) => ({ el, f: parseFloat(el.getAttribute("data-plx")) || 0 }));
      let tx = 0, ty = 0, x = -1e4, y = -1e4, nxT = 0, nyT = 0, nx = 0, ny = 0, raf = 0, over = false;
      const step = () => {
        raf = 0;
        x += (tx - x) * 0.14; y += (ty - y) * 0.14;
        nx += (nxT - nx) * 0.10; ny += (nyT - ny) * 0.10;
        glow.style.transform = "translate3d(" + (x - half) + "px," + (y - half) + "px,0)";
        for (const p of plx) p.el.style.transform = "translate3d(" + (nx * p.f).toFixed(2) + "px," + (ny * p.f * 0.55).toFixed(2) + "px,0)";
        if (over || Math.abs(tx - x) + Math.abs(ty - y) + (Math.abs(nxT - nx) + Math.abs(nyT - ny)) * 60 > 0.8) raf = requestAnimationFrame(step);
      };
      const move = (e) => {
        const r = host.getBoundingClientRect();
        if (!r.width || !r.height) return;
        tx = e.clientX - r.left; ty = e.clientY - r.top;
        nxT = (tx / r.width) * 2 - 1; nyT = (ty / r.height) * 2 - 1;
        if (!over) { over = true; if (x < -9000) { x = tx; y = ty; } glow.style.opacity = "1"; }
        if (!raf) raf = requestAnimationFrame(step);
      };
      const leave = () => {
        over = false; glow.style.opacity = "0";
        nxT = 0; nyT = 0;                       // sky eases back to rest
        if (!raf) raf = requestAnimationFrame(step);
      };
      host.addEventListener("pointermove", move, { passive: true });
      host.addEventListener("pointerleave", leave, { passive: true });
      return () => { host.removeEventListener("pointermove", move); host.removeEventListener("pointerleave", leave); if (raf) cancelAnimationFrame(raf); };
    } catch (e) { return null; }
  }

  renderVals() {
    const active = this.props.active || "";
    // theme="gala" (homepage): glassmorphic space-blue 104px header — dark navy glass,
    // faint stars/nebula decor, white HISPA logo, light links, metallic-gold CTA.
    // Default (all other pages) stays cream/orange.
    const gala = (this.props.theme || "") === "gala";
    const navy = gala ? "#EAF2FB" : "#002B3A", on = "#FD4D1C";
    const c = (k) => active === k ? on : navy;
    const menuOpen = !!this.state.menuOpen;
    return {
      isGala: gala,
      galaClass: gala ? " hispa-head--gala" : "",
      setHead: (el) => { if (el) { this.headEl = el; if (gala && !this._glow) this._glow = this._initGlow(el); } },
      headerBg: gala ? "linear-gradient(135deg, rgba(14,28,62,0.88) 0%, rgba(8,19,45,0.86) 50%, rgba(9,15,35,0.90) 100%)" : "rgba(251,246,238,0.92)",
      headerBlur: gala ? "blur(16px) saturate(1.25)" : "blur(10px)",
      headerBorder: gala ? "1px solid rgba(120,170,240,0.16)" : "1px solid rgba(0,43,58,0.10)",
      headerShadow: gala ? "0 10px 34px rgba(3,8,22,0.45), inset 0 1px 0 rgba(158,206,255,0.10)" : "none",
      headerFont: gala ? "'Sofia Pro','Figtree','Hanken Grotesk',sans-serif" : "'Sofia Pro','Hanken Grotesk',sans-serif",
      navMaxW: gala ? "1460px" : "1200px",
      logoSrc: gala ? "brand/hispa-logo-white.svg" : "brand/hispa-logo.svg",
      logoH: gala ? "66px" : "52px",
      logo20H: gala ? "56px" : "50px",
      lockupDivider: gala ? "rgba(234,242,251,0.25)" : "rgba(0,43,58,0.15)",
      linkSize: gala ? "16px" : "14px",
      linkWeight: gala ? "500" : "600",
      iconStroke: gala ? "#EAF2FB" : "#002B3A",
      ctaSize: gala ? "15px" : "14px",
      ctaColor: gala ? "#002B3A" : "#fff",
      ctaBg: gala ? "linear-gradient(100deg,#F6DD9A 0%,#DFB253 45%,#C08F38 100%)" : "#FD4D1C",
      ctaPad: gala ? "16px 30px" : "10px 20px",
      ctaShadow: gala ? "0 8px 20px rgba(211,168,78,0.38)" : "0 4px 12px rgba(253,77,28,0.28)",
      panelBg: gala ? "rgba(9,19,42,0.97)" : "rgba(251,246,238,0.98)",
      isDoes: active === "does", isBegan: active === "began",
      isTimeline: active === "timeline", isVoices: active === "voices",
      isTnn: active === "tnn", isRecognition: active === "recognition", isThankYous: active === "thankyous",
      doesColor: c("does"), beganColor: c("began"),
      timelineColor: c("timeline"), voicesColor: c("voices"), tnnColor: c("tnn"),
      recognitionColor: c("recognition"), thankyousColor: c("thankyous"),
      menuOpen, menuClosed: !menuOpen,
      hamburgerLabel: menuOpen ? "Close menu" : "Open menu",
      toggleMenu: () => this.setState({ menuOpen: !this.state.menuOpen }),
    };
  }
}
</script>
